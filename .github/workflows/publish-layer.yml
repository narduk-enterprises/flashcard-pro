name: Publish Layer

on:
  push:
    branches: [main]
    paths:
      - 'layers/narduk-nuxt-layer/**'

concurrency:
  group: publish-layer
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump patch version
        working-directory: layers/narduk-nuxt-layer
        run: |
          npm version patch --no-git-tag-version
          echo "LAYER_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Publish to GitHub Packages
        working-directory: layers/narduk-nuxt-layer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add layers/narduk-nuxt-layer/package.json
          git commit -m "chore: bump layer to v${LAYER_VERSION} [skip ci]"
          git push
